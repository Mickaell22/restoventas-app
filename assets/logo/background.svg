<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Capa de fondo del adaptive icon: cuadrado pleno con el gradiente de
       marca. Sin esquinas redondeadas: Android aplica su propia mascara. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb8c3a"/>
      <stop offset="1" stop-color="#e2530a"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
</svg>
